<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Controle de Desperdício</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:40px;
}

header{
background:#d32f2f;
color:white;
padding:15px;
border-radius:6px;
}

input,select,button{
padding:8px;
margin:5px;
}

button{
background:#fbc02d;
border:none;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ffd54f;
}

table{
margin-top:20px;
border-collapse:collapse;
width:800px;
background:white;
}

th{
background:#d32f2f;
color:white;
}

td,th{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

.excluir{
color:red;
font-weight:bold;
cursor:pointer;
}

footer{
margin-top:40px;
text-align:center;
color:#999;
}

</style>
</head>

<body>

<header>
<h2>Controle de Desperdício de Alimentos</h2>
</header>

<br>

<input id="produto" placeholder="Produto">

<input id="quantidade" type="number" placeholder="Quantidade">

<select id="tipo">
<option value="kg">Kg</option>
<option value="unidade">Unidade</option>
</select>

<input id="valor" type="number" step="0.01" placeholder="Valor (R$)">

<select id="motivo">
<option>Vencido</option>
<option>Danificado</option>
<option>Estragado</option>
</select>

<button onclick="registrar()">Registrar</button>

<h3>Prejuízo total: R$ <span id="total">0.00</span></h3>

<table>

<tr>
<th>Produto</th>
<th>Quantidade</th>
<th>Tipo</th>
<th>Valor</th>
<th>Motivo</th>
<th>Prejuízo</th>
<th>X</th>
</tr>

<tbody id="tabela"></tbody>

</table>

<footer>
produzido por Kauã Castro
</footer>

<script>

let registros = JSON.parse(localStorage.getItem("desperdicio")) || []

function salvar(){
localStorage.setItem("desperdicio", JSON.stringify(registros))
}

function calcularTotal(){

let total = 0

registros.forEach(item=>{
total += Number(item.prejuizo)
})

document.getElementById("total").innerText = total.toFixed(2)

}

function excluirRegistro(index){

registros.splice(index,1)

salvar()

mostrarTabela()

calcularTotal()

}

function mostrarTabela(){

let tabela = document.getElementById("tabela")

tabela.innerHTML=""

registros.forEach((item,index)=>{

let linha = document.createElement("tr")

linha.innerHTML = `
<td>${item.produto}</td>
<td>${item.quantidade}</td>
<td>${item.tipo}</td>
<td>R$ ${item.valor}</td>
<td>${item.motivo}</td>
<td>R$ ${item.prejuizo}</td>
<td class="excluir" onclick="excluirRegistro(${index})">X</td>
`

tabela.appendChild(linha)

})

}

function registrar(){

let produto = document.getElementById("produto").value
let quantidade = document.getElementById("quantidade").value
let tipo = document.getElementById("tipo").value
let valor = document.getElementById("valor").value
let motivo = document.getElementById("motivo").value

if(produto=="" || quantidade=="" || valor==""){
alert("Preencha todos os campos")
return
}

let prejuizo = quantidade * valor

let registro = {

produto:produto,
quantidade:quantidade,
tipo:tipo,
valor:valor,
motivo:motivo,
prejuizo:prejuizo.toFixed(2)

}

registros.push(registro)

salvar()

mostrarTabela()

calcularTotal()

document.getElementById("produto").value=""
document.getElementById("quantidade").value=""
document.getElementById("valor").value=""

}

mostrarTabela()

calcularTotal()

</script>

</body>

</html>
